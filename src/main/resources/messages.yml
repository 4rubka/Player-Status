
prefix: '<gradient:#FF6B6B:#4ECDC4>[PlayerStatus]</gradient> '

status-equipped: '<green>✔ You have equipped the status: %status%'
status-removed: '<yellow>✔ Your status has been removed.'
status-purchased: '<green>✔ Status purchased successfully! You can now equip: %status%'
not-enough-money: '<red>✖ Not enough money. You need <gold>%price% <red>more.'
already-owned: '<yellow>You already own this status!'
already-equipped: '<yellow>This status is already equipped!'
no-permission: '<red>✖ You do not have permission to use this.'
status-not-found: '<red>✖ Status not found: <white>%status%'
player-not-found: '<red>✖ Player not found: <white>%player%'
no-status-equipped: '<gray>You don''t have any status equipped.'
requirements-not-met: '<red>✖ You do not meet the requirements for this status.'
preview-message: '<gray>Preview: Your name would appear as: <white>%player% %status%'
economy-not-available: '<red>✖ Economy system is not available.'

reload-success: '<green>✔ Configuration reloaded successfully!'
status-given: '<green>✔ Status <white>%status% <green>given to <white>%player%<green>.'
status-removed-admin: '<green>✔ Status <white>%status% <green>removed from <white>%player%<green>.'
player-reset: '<green>✔ All statuses reset for <white>%player%<green>.'
status-given-notify: '<green>✔ You have been given the status: %status%'
status-removed-notify: '<yellow>The status <white>%status% <yellow>has been removed from your collection.'

usage: '<yellow>Usage: /status [reload|give|remove|reset|list]'
usage-give: '<yellow>Usage: /status give <player> <status>'
usage-remove: '<yellow>Usage: /status remove <player> <status>'
usage-reset: '<yellow>Usage: /status reset <player>'

lore:
  status-owned: '<green>✔ Owned'
  status-locked: '<red>✖ Locked'
  status-equipped: '<aqua>★ Equipped'
  price-line: '<gray>Price: <gold>%price%'
  category-line: '<gray>Category: <yellow>%category%'
  click-to-equip: '<yellow>▸ Left Click to equip'
  click-to-purchase: '<yellow>▸ Left Click to purchase'
  click-to-preview: '<gray>▸ Right Click to preview'
  requirement-line: '<gray>Requires: <white>%requirement%'
  description-line: '<gray>%description%'

list-header: '<gold>══════ Available Statuses ══════'
list-entry: '<gray>- <white>%id% <gray>| %display% <gray>| <gold>%price%'
list-footer: '<gold>════════════════════════════════'
